name: Deploy Sanity Studio

on:
  push:
    branches:
      - main
    paths:
      - 'sanity/**'
      - 'sanity.config.ts'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx sanity deploy --no-confirm
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
